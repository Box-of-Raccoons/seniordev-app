appId: com.boxofraccoons.seniordev
productName: SeniorDev
protocols:
  - name: SeniorDev
    schemes: [seniordev]
directories:
  buildResources: build
  output: release
files:
  - out/**
  - package.json
# Ship the default prompt library so a fresh install can seed it into the user's
# promptsDir on first run. Lands at <resourcesPath>/prompts (see bundledPromptsDir).
extraResources:
  - from: resources/prompts
    to: prompts
    filter:
      - '**/*.md'
win:
  target: nsis
  icon: build/icon.png
mac:
  target: dmg
  category: public.app-category.developer-tools
  icon: build/icon.png
linux:
  target: AppImage
  category: Development
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
