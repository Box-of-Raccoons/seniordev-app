appId: com.boxofraccoons.seniordev
productName: SeniorDev
protocols:
  - name: SeniorDev
    schemes: [seniordev]
directories:
  buildResources: build
  output: release
# node-pty is rebuilt for the Electron ABI by @electron/rebuild (see the `dist`
# script) via node-gyp. electron-builder's own `npm rebuild` path instead runs
# node-pty's `build` script (`tsc -b`), which fails compiling node-pty's bundled
# test files — so disable it here and let @electron/rebuild own native rebuilds.
npmRebuild: false
files:
  - out/**
  - package.json
# Ship the default prompt library so a fresh install can seed it into the user's
# promptsDir on first run. Lands at <resourcesPath>/prompts (see bundledPromptsDir).
extraResources:
  - from: resources/prompts
    to: prompts
    filter:
      - '**/*.md'
  # Ship tray/app images so the SeniorDevWatch tray icon resolves at
  # <resourcesPath>/assets in packaged builds (see assetPath in src/watch/main.ts).
  - from: assets
    to: assets
    filter:
      - '**/*.png'
win:
  target: nsis
  icon: build/icon.png
mac:
  target: dmg
  category: public.app-category.developer-tools
  icon: build/icon.png
linux:
  target: AppImage
  category: Development
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
