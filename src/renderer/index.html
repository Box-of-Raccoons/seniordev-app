<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>SeniorDev</title>
    <style>
      /* Critical: paint the dark theme background immediately, before the module
         CSS (base.css) loads, so the window never flashes a white/blank frame.
         #131a17 is the sRGB form of --bg (oklch(0.21 0.012 165)). */
      html, body { margin: 0; height: 100%; background: #131a17; }
      #app { height: 100%; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
