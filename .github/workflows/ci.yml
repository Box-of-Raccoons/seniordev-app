name: ci

# The test gate the repo previously lacked: typecheck + full vitest suite on every
# push to an integration branch and on every PR. Runs on Windows (VS 2022 image):
# SeniorDev is a Windows-targeted Electron app, and part of the suite assumes a
# case-insensitive filesystem (e.g. prompt-file self-skip), so a Linux runner
# reports false failures. Matches the platform the app actually ships for.
on:
  push:
    branches: [develop, main]
  pull_request:

jobs:
  test:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
