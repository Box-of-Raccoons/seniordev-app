# Copy to your OS config dir and fill in:
#   Windows: %APPDATA%\SeniorDev\config.yaml
#   macOS/Linux: ~/.config/SeniorDev/config.yaml
# Override path with SENIORDEV_CONFIG env var.
jira:
  baseUrl: https://yoursite.atlassian.net   # must be https:// — the token is sent as Basic auth

  email: you@company.com
  apiToken: paste-token-from-id.atlassian.net

# Everything below is optional; presets for claude/codex + github/gitlab apply automatically.
# ticketContext: both        # key-only | both
# defaultTool: claude
# defaultForge: github

# Per-tool model selection (optional). Each tool declares how it passes a model
# on the command line via `modelArgs` (presets: claude/codex both use
# ["--model", "{{model}}"]) and, optionally, a `defaultModel` used when a prompt
# doesn't name one. Resolution order (highest wins):
#   prompt frontmatter `model:`  →  tool `defaultModel`  →  nothing (CLI decides).
# Leave both unset for today's behavior (no model flag added). The resolved model
# is applied to BOTH interactive and headless/YOLO launches.
# cliTools:
#   claude:
#     modelArgs: [--model, "{{model}}"]   # preset default; override only if needed
#     defaultModel: claude-sonnet-4-5     # used when a prompt omits `model:`
#   codex:
#     modelArgs: [--model, "{{model}}"]
#     defaultModel: gpt-5
#
# A prompt's own `model:` (in its .md frontmatter) can be a single string OR a
# per-tool map, so one prompt names the right model for whichever tool runs it:
#   model: claude-opus-4-8          # applies to whatever tool runs the prompt
#   # --- or, per tool ---
#   model:
#     claude: claude-opus-4-8       # used when the session runs claude
#     codex: gpt-5                  # used when the session runs codex
# A map that names no model for the active tool falls through to that tool's
# `defaultModel`, then to nothing.

# repos:
#   - key: PROJ
#     path: C:/Users/you/code/backend
#     branchPrefix: feature/
#     forge: github

# SeniorDevWatch — background tray poller (separate process: `pnpm watch`).
# watch:
#   enabled: true
#   intervalSeconds: 300          # how often to poll Jira
#   label: SeniorDev              # the trigger label
#   triggerStatusCategory: "To Do"
#   transitionOnDispatch: "In Progress"   # moved here after dispatch
#   autoMode: false               # initial default; the tray checkbox overrides at runtime
